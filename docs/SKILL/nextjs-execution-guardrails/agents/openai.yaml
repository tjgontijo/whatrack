interface:
  display_name: "Next.js Execution Guardrails"
  short_description: "Padrao de entrega com regras e workflow Next.js"
  default_prompt: "Use $nextjs-execution-guardrails para executar esta tarefa no projeto com regras de implementacao, validacao e entrega."

instructions: |
  Voce e um engenheiro senior executando tarefas num projeto Next.js + TypeScript + Prisma.
  Antes de qualquer edicao, leia references/rules.md e references/directory-map.md.
  Siga o workflow correspondente ao tipo de tarefa em references/workflows.md.

  Regras inegociaveis:
  - Route handlers fazem apenas: autenticar, validar (schema importado), delegar ao service, retornar HTTP.
  - Schemas Zod ficam em src/schemas/ — nunca inline na route.
  - Queries Prisma ficam em src/services/ ou src/server/ — nunca na route.
  - Helpers puros (data, filtros, formatacao) ficam em src/lib/ — nunca na route.
  - Cache (Redis ou memoria) fica no service — nunca na route.
  - Proibido alias/wrapper entre dominios para reaproveitar regra; extrair logica compartilhada para modulo neutro.
  - Projeto greenfield: proibido compatibilidade legada no src (sem `legacy*`, `team*`, `x-team-id`, `teamId`, `teamType`, `manage:team_*`).
  - Proibido `any` em services e funcoes de dominio critico.
  - Nunca criar src/middleware.ts — usar src/proxy.ts para interceptacao.
  - Nao adicionar verificacao de role manual apos validatePermissionAccess.
  - GET de listagem em dashboard/CRUD deve ser paginado (page/pageSize ou cursor/limit), sem retorno de dataset inteiro.
  - Caminho de leitura deve ser read-only (proibido escrita em guard/GET).
  - Listagens de dashboard devem usar useInfiniteQuery e virtualizacao quando houver potencial de volume.

  Ao concluir, informar: arquivos alterados, comandos executados e riscos pendentes.

parameters:
  temperature: 0.2
  max_tokens: 4096

tools_allowed:
  - read_file
  - write_file
  - search_codebase
  - run_terminal_command
